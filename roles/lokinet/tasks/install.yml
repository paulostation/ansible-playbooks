- name: Copy iptables ruleset
  copy:
    src: iptables.rules
    dest: /etc/iptables.rules
    mode: 0644

- name: Apply iptables rules
  become: true
  shell: iptables-restore < /etc/iptables.rules

- name: Insert statement to load iptables rules on
  become: true
  ansible.builtin.blockinfile:
    insertbefore: exit 0
    path: /etc/rc.local
    block: |
      iptables-restore < /etc/iptables.rules

- name: Copy lokinet-vpn monitor bash script
  copy:
    src: manage-lokinet-vpn.sh
    dest: /usr/bin/manage-lokinet-vpn.sh
    mode: 0755

# - name: Copy lokinet-vpn daemon unit file
#   copy:
#     src: lokinet_vpn.service
#     dest: /etc/systemd/system/
#     mode: 0644


- name: Copy lokinet-vpn daemon unit file
  copy:
    src: lokinet-vpn-manager.service
    dest: /etc/systemd/system/
    mode: 0644

# - name: Reload service lokinet-vpn, in all cases
#   ansible.builtin.systemd:
#     daemon_reload: true

- name: Enable service lokinet monitor and ensure it is not masked
  systemd:
    name: lokinet-vpn-manager.service
    enabled: yes
    masked: no
  tags:
    - systemd

- name: Make sure the service unit is running
  systemd:
    state: restarted
    daemon_reload: yes
    name: lokinet-vpn-manager.service
  tags:
    - systemd
